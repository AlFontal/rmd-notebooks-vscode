name: release

on:
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: Publish to the VS Code Marketplace
        required: false
        default: false
        type: boolean
      publish_openvsx:
        description: Publish to Open VSX
        required: false
        default: true
        type: boolean
      create_openvsx_namespace:
        description: Create the Open VSX namespace before publishing
        required: false
        default: false
        type: boolean
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test:unit
      - run: npm run package:vsix

      - uses: actions/upload-artifact@v4
        with:
          name: rmd-notebooks-vsix
          path: "*.vsix"

      - name: Attach VSIX to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

      - name: Publish to VS Code Marketplace
        if: github.event_name == 'release' || inputs.publish_marketplace
        run: npm run deploy
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create Open VSX namespace
        if: inputs.create_openvsx_namespace
        run: npx ovsx create-namespace AlFontal -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish to Open VSX
        if: github.event_name == 'release' || inputs.publish_openvsx
        run: npx ovsx publish -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
